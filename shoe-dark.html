<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vora Sport | Detalles de Producto</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body id="page-details"> 
    <nav class="navbar navbar-expand-lg fixed-top custom-navbar">
        <div class="container px-4">
            <a class="navbar-brand d-flex align-items-center" href="index.html">
                <img src="./Stock/logo.png" class="nav-logo" alt="Logo VORA">
                <span class="logo-text">VORA</span>
                
            </a>

            </a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navPrincipal">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navPrincipal">
                <ul class="navbar-nav ms-auto align-items-center">
                    <li class="nav-item"><a class="nav-link mx-2" href="#">Mujer</a></li>
                    <li class="nav-item"><a class="nav-link mx-2" href="#">Hombre</a></li>
                    <li class="nav-item ms-lg-3">
                        <a class="nav-link px-2" href="#"><i class="bi bi-search"></i></a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link px-2" href="#"><i class="bi bi-heart"></i></a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link px-2" href="#"><i class="bi bi-bag"></i></a>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <div style="height: 100px;"></div>

    <main class="container my-5">
        <div class="product-details-container">
            <div class="gallery-column">
                <div class="thumbnails">
                    <button class="thumb-arrow up" id="prevBtn" title="Anterior">
                        <i class="bi bi-chevron-up"></i>
                    </button>
                    
                    <div id="thumb-list"></div>
                    
                    <button class="thumb-arrow down" id="nextBtn" title="Siguiente">
                        <i class="bi bi-chevron-down"></i>
                    </button>
                </div>
                
                <div class="main-image">
                    <img id="detalle-imagen-principal" src="Stock/bota cafe 1.png" alt="Producto Principal" class="img-fluid">
                </div>
            </div>

            <div class="info-column">
                <nav aria-label="breadcrumb">
                    <ol class="breadcrumb mb-2">
                        <li class="breadcrumb-item"><a href="index.html" class="text-decoration-none text-muted small">Inicio</a></li>
                        <li class="breadcrumb-item active small" aria-current="page">Calzado</li>
                    </ol>
                </nav>

                <h1 id="detalle-titulo" class="headline-details">Cargando producto...</h1>
                <p id="detalle-precio" class="price-details"></p>
                
                <div class="description-text mb-4">
                    <p class="text-secondary">Diseño ergonómico pensado para la máxima durabilidad y confort en cualquier terreno.</p>
                </div>

                <ul id="detalle-specs" class="specs-list">
                    </ul>

                <div class="options-group">
                    <label class="form-label small fw-bold text-uppercase">Género:</label>
                    <select id="gender" class="form-select mb-3">
                        <option selected disabled>Seleccionar opción</option>
                        <option value="hombre">Hombre</option>
                        <option value="mujer">Mujer</option>
                    </select>
                    
                    <label class="form-label small fw-bold text-uppercase">Talla (MX):</label>
                    <select id="sizes" class="form-select mb-3">
                        <option selected disabled>Seleccionar talla</option>
                        <option>25</option>
                        <option>26</option>
                        <option>27</option>
                        <option>28</option>
                    </select>
                </div>

                <div class="purchase-actions mt-4">
                    <div class="quantity-selector">
                        <button class="btn-qty" type="button" id="minus-btn">-</button>
                        <input type="text" value="1" readonly id="qty-input">
                        <button class="btn-qty" type="button" id="plus-btn">+</button>
                    </div>
                    <button class="btn-add-cart w-100">AÑADIR AL CARRITO</button>
                </div>
                
                <div class="delivery-info mt-4">
                    <p class="small text-muted"><i class="bi bi-truck me-2"></i> Envío estándar gratuito en pedidos superiores a $2,000 MXN.</p>
                </div>
            </div>
        </div>
    </main>

    <footer class="footer-aura mt-5">
        <div class="container py-4">
            <div class="row align-items-center">
                <div class="col-md-6 text-center text-md-start">
                    <p class="mb-0 copyright-text">© Copyright VORA 2026. Todos los derechos reservados.</p>
                </div>
            </div>
        </div>
    </footer>

    <script src="script.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
