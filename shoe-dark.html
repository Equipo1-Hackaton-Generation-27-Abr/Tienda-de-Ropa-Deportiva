<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vora Sport | Detalles</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body>
    <!-- NAV BAR AXEL -->
    <nav class="navbar navbar-expand-lg fixed-top custom-navbar">
        <div class="container px-4">
            <a class="navbar-brand d-flex align-items-center" href="./index.html">
                <img src="./Stock/logo.png" class="nav-logo" alt="Logo VORA">
                <span class="logo-text">VORA</span>
            </a>

            <button class="navbar-toggler border-0" type="button" data-bs-toggle="collapse" data-bs-target="#navPrincipal" aria-controls="navPrincipal" aria-expanded="false" aria-label="Toggle navigation">
                <span class="navbar-toggler-icon"></span>
            </button>

            <div class="collapse navbar-collapse" id="navPrincipal">
                <ul class="navbar-nav ms-auto align-items-center">
                    <li class="nav-item">
                        <a class="nav-link mx-2" href="#">Mujer</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link mx-2" href="#">Hombre</a>
                    </li>

                    <li class="nav-item ms-lg-3">
                        <a class="nav-link px-2" href="#" title="Buscar">
                            <i class="bi bi-search"></i>
                        </a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link px-2" href="#" title="Favoritos">
                            <i class="bi bi-heart"></i>
                        </a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link px-2" href="#" title="Carrito">
                            <i class="bi bi-bag"></i>
                        </a>
                    </li>
                </ul>
            </div>
        </div>
    </nav>
    <!-- NAVBAR AXEL -->

    <div style="height: 100px;"></div>

    <main class="container my-5">
        <div class="product-details-container">
            <div class="gallery-column">
                <div class="thumbnails">
                    <button class="thumb-arrow up">&#8963;</button>
                    <div id="thumb-list"></div>
                    <button class="thumb-arrow down">&#8964;</button>
                </div>
                <div class="main-image">
                    <img id="detalle-imagen-principal" src="" alt="Producto Principal" class="img-fluid">
                </div>
            </div>

            <div class="info-column">
                <h1 id="detalle-titulo" class="headline-details"></h1>
                <p id="detalle-precio" class="price-details"></p>
                
                <ul id="detalle-specs" class="specs-list"></ul>

                <div class="options-group">
                    <label>Género:</label>
                    <select id="gender" class="form-select mb-3"><option>Seleccionar opción</option></select>
                    
                    <label>Talla:</label>
                    <select id="sizes" class="form-select mb-3"><option>Seleccionar talla</option></select>
                </div>

                <div class="purchase-actions">
                    <div class="quantity-selector">
                        <button class="btn-qty">-</button>
                        <input type="text" value="1" readonly>
                        <button class="btn-qty">+</button>
                    </div>
                    <button class="btn-add-cart">ADD TO CART</button>
                </div>
            </div>
        </div>
    </main>

    <!-- FOOTER AXEL -->
    <footer class="footer-aura mt-2">
        <div class="container py-4">
            <div class="row">
                <div class="col-12 text-center">
                    <p class="mb-0 copyright-text">© VORA 2026. Todos los derechos reservados.</p>
                </div>
            </div>
        </div>
    </footer>
    <!-- FOOTER AXEL -->

    <script src="detalles.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
